name: ProLink Frontend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ══════════════════════════════════════════════════════
  # STAGE 1: CODE QUALITY CHECKS
  # Runs on every push and every pull request
  # If this fails, nothing deploys. Your code has errors.
  # ══════════════════════════════════════════════════════
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: .
        # Type errors now block deployment — all TS errors have been fixed

      - name: ESLint check
        run: npx next lint --max-warnings 20
        working-directory: .
        # Allows up to 20 warnings. Errors still block.

      - name: Build test (does the project compile?)
        run: npm run build
        working-directory: .
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          # Add all NEXT_PUBLIC_ variables here

  # ══════════════════════════════════════════════════════
  # STAGE 2: DEPLOY TO STAGING
  # Only runs when pushing to the develop branch
  # Creates a Vercel preview deployment
  # ══════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy to Staging
    needs: quality
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.preview-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for staging
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy to Vercel (staging preview)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview-url=$url" >> $GITHUB_OUTPUT
          echo "Staging URL: $url"

      - name: Comment staging URL on commit
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview-url }}';
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🚀 **Staging deployed!**\n\nPreview URL: ${url}\n\nTest everything before merging to main.`
            });

  # ══════════════════════════════════════════════════════
  # STAGE 3: DEPLOY TO PRODUCTION
  # Only runs when merging/pushing to main branch
  # This is what your real users see
  # Requires manual approval (configured in GitHub environments)
  # ══════════════════════════════════════════════════════
  deploy-production:
    name: Deploy to Production
    needs: quality
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://prolink-eight.vercel.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy to Vercel PRODUCTION
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Notify deployment success
        run: echo "✅ Production deployment complete — prolink-eight.vercel.app is live"
