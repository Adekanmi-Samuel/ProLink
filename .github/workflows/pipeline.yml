name: ProLink CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  quality:
    name: ✅ Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./prolink-frontend
        run: npm ci

      - name: Frontend — Build test
        working-directory: ./prolink-frontend
        run: npx next build
        env:
          NODE_ENV: production

      - name: Install Backend Dependencies
        working-directory: ./prolink-backend
        run: npm ci

      - name: Backend — Build test (Prisma generation)
        working-directory: ./prolink-backend
        run: npm run vercel-build
